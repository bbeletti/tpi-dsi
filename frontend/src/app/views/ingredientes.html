<div class="view-container">
  <header class="view-header">
    <div class="header-title">
      <h1>Ingredientes</h1>
      <p>Administra los insumos y costos unitarios de las recetas</p>
    </div>
    <div class="header-actions">
      <button class="btn btn-primary" (click)="openNewForm()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Nuevo Ingrediente
      </button>
    </div>
  </header>

  <!-- Form Panel overlay / Side Panel -->
  <div class="modal-overlay" *ngIf="showForm()">
    <div class="modal-card">
      <div class="modal-header">
        <h2>{{ formTitle() }}</h2>
        <button class="btn-close" (click)="closeForm()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <form (submit)="saveIngrediente(); $event.preventDefault()" class="modal-form">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" [ngModel]="nombre()" (ngModelChange)="nombre.set($event)" name="nombre" class="form-control" placeholder="Ej: HARINA 0000" required>
        </div>
        <div class="form-group">
          <label for="costo">Costo Unitario ($)</label>
          <input type="number" step="0.01" id="costo" [ngModel]="costo()" (ngModelChange)="costo.set($event)" name="costo" class="form-control" placeholder="0.00" required>
        </div>
        <div class="form-group">
          <label for="unidadMedida">Unidad de Medida</label>
          <select id="unidadMedida" [ngModel]="unidadMedidaId()" (ngModelChange)="unidadMedidaId.set($event)" name="unidadMedidaId" class="form-control">
            <option *ngFor="let um of unidadesMedida()" [value]="um.id">{{ um.nombre }}</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="closeForm()">Cancelar</button>
          <button type="submit" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Tabla de Datos -->
  <div class="table-card glass-panel">
    <div class="table-container" *ngIf="ingredientes().length > 0; else emptyIngredientes">
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Costo Unitario</th>
            <th>Unidad de Medida</th>
            <th class="text-right">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let ing of ingredientes()">
            <td>#{{ ing.id }}</td>
            <td class="text-bold">{{ ing.nombre }}</td>
            <td class="text-accent">${{ ing.costo | number:'1.2-2' }}</td>
            <td>
              <span class="badge badge-info">{{ ing.unidad_medida?.nombre || 'N/A' }}</span>
            </td>
            <td class="text-right actions-cell">
              <div class="actions-wrapper">
                <button class="btn btn-icon btn-edit" (click)="openEditForm(ing)" title="Editar">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                </button>
                <button class="btn btn-icon btn-delete" (click)="deleteIngrediente(ing.id)" title="Eliminar">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <ng-template #emptyIngredientes>
      <div class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
        <p>No se encontraron ingredientes registrados.</p>
        <button class="btn btn-secondary" (click)="openNewForm()">Agregar Insumo</button>
      </div>
    </ng-template>
  </div>
</div>
